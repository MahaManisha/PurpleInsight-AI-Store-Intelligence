databases:
  # Database Service (PostgreSQL 15)
  - name: purple-postgres
    plan: free
    ipAllowList: [] # Only allow internal connection within the Render account

services:
  # Backend Web Service (FastAPI)
  - type: web
    name: purple-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: purple-postgres
          property: connectionString
      - key: PORT
        value: 8000

  # Frontend Web Service (Nginx)
  - type: web
    name: purple-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 80
